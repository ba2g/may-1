name: CI/CD to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Tüm geçmişi ve alt klasörleri çekmesi için

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./spring-petclinic # Eğer kodlar bu klasördeyse yolu buraya verdik
        file: ./spring-petclinic/Dockerfile # Dockerfile nerede?
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/petclinic:latest